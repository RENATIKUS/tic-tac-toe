<!DOCTYPE html>
<html>
    <head>
        <title>Tic Tac Toe</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                /*display: flex;*/
                /*height: 100vh;
                margin: 0px;

                align-content: center;
                justify-items: center;*/

                font-family: Audiowide;
                font-size: 25px;

                /*background-color: rgb(140, 0, 255);*/

                /*background-color: blueviolet;*/
            }

            input {
                color: rgb(0, 0, 0);
            }

            #board {
                display: grid;
                grid-template-columns: repeat(3, 100px);
                grid-template-rows: repeat(3, 100px);
                gap: 10px;

                justify-content: center;
            }

            .cell {
                background-color: rgb(240, 240, 240);
                border-radius: 10px;

                text-align: center;
                align-content: center;

                font-size: 30px;

                transition: background-color 0.15s;

                cursor: pointer;
            }

            .win-cell {
                background-color: rgb(157, 58, 250);
            }

            /*.cell:hover {
                background-color: rgb(157, 58, 250);
            }*/

            .cell:active {
                background-color: rgb(157, 58, 250);
            }

            button {
                /*width: 100px;
                height: 100px;*/

                border-radius: 10px;
                border: 0px solid;

                font-family: Audiowide;
                font-size: 30px;

                cursor: pointer;

                transition: background-color 0.3s;
            }

            button:hover {
                background-color: rgb(0, 110, 255);
            }

            button:active {
                background-color: rgb(0, 110, 255);
            }

            #reset-button {
                height: 50px;
                width: 100%;

                /*background-color: rgb(157, 58, 250);*/
                background-color: rgb(140, 0, 255);
            }

            #settings {
                display: flex;
                flex-direction: column;
                border-radius: 10px;
                background-color: rgb(240, 240, 240);

                padding: 10px;
                margin-top: 10px;
                gap: 10px;

                transition: background-color 1s;
            }

            /* #settings:hover {
                background-color: black;
            } */

            #game {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 320px;
                display: flex;
                flex-direction: column;

                justify-content: center;
                /*align-items: center;*/
                /*justify-content: center;*/

                /*width: auto;
                height: auto;*/
                padding: 10px;

                border-radius: 10px;
                /*background-color: rgb(233, 194, 19);*/
                /*background-color: rgb(255, 196, 0);*/
                background-color: rgb(248 198 30);
            }

            input {
                font-family: Audiowide;
            }

            #player1, #player2 {
                display: flex;
                flex-direction: row;
                /*justify-content: center;*/
                gap: 10px;
            }

            .confirm-button {
                /*width: 25%;*/
                width: 100%;
                height: auto;

                font-size: small;
                background-color: blueviolet;

                /*flex-grow: 1;*/
                /*max-width: 25px;*/
            }

            .text-input {
                /*width: 33%;*/
                height: 25px;

                border-radius: 10px;
                border: 1px solid;

                /*flex-grow: 2;*/

                /*max-width: 25px;*/
            }

            .color-input {
                /*width: 33%;*/

                flex-grow: 1;
                border-radius: 12px;

                /*max-width: 25px;*/
            }

            #turn {
                margin-top: 10px;
                margin-bottom: 10px;

                font-size: xx-large;
            }

            /*@media (max-width: 600px) {
                #game {
                    height: 100vh;
                }
            }*/

            #test {
                display: flex;
                flex-direction: column;
            }

        </style>
    </head>

    <body>

 
        <div id="game">

            

            <div id="board">
                <div index="0" class="cell"></div>
                <div index="1" class="cell"></div>
                <div index="2" class="cell"></div>
                <div index="3" class="cell"></div>
                <div index="4" class="cell"></div>
                <div index="5" class="cell"></div>
                <div index="6" class="cell"></div>
                <div index="7" class="cell"></div>
                <div index="8" class="cell"></div>
            </div>

            <div id="test">
                <p id="turn">Turn: X</p>

                <button id="reset-button">Restart</button>
            </div>
            

            <div id="settings">
                <div id="player1">
                    <input id="symbol-input-p1" class="text-input" placeholder="Player 1" maxlength="3">
                    <!--<input class="color-input" type="color">-->
                    <button player="1" class="confirm-button">OK</button>
                </div>

                <div id="player2">
                    <input id="symbol-input-p2" class="text-input" placeholder="Player 2" maxlength="3">
                    <!--<input class="color-input" type="color">-->
                    <button player="2" class="confirm-button">OK</button>
                </div>
            </div>

        </div>
        

        <script src="TicTacToe.js"></script>
    </body>
</html>
